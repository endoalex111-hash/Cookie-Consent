<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a Cookie Consent Project.">
    <title>Cookie Consent</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/98d8ec6431.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">

        <div class="container__cookies-section" id="cookie-popup">

            <div class="container__icons-section">

                <i class="fa fa-cookie-bite" aria-hidden="true"></i>
                <i class="fa fa-multiply" id="cookie-close" role="button" aria-label="Close cookie consent"></i>

            </div>

            <div class="container__text-section">

                <p id="cookie-title">We use cookies to improve your user experience.</p>

            </div>

            <div class="container__button-section">

                <button id="accept-cookies">I like Cookies</button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
